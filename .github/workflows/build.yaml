name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Test build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Test build
        uses: home-assistant/builder@2024.08.2
        with:
          args: |
            --test \
            --aarch64 \
            --amd64 \
            --target openclaw \
            --docker-hub ghcr.io/${{ github.repository_owner }}
